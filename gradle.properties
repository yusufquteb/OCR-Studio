org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# KSP2 (the K2-based KSP implementation) has known compatibility issues with Room 2.6.1's
# annotation processor -- FTS entities (PageFts/WordFts) fail with a spurious
# "[MissingType]" error under KSP2. Forcing legacy KSP1 avoids it.
ksp.useKSP2=false

# Build flags: guarded engines/correctors that depend on artifacts whose
# exact Maven coordinates may not be resolvable in every environment.
# Tesseract remains the guaranteed OCR path regardless of these flags.
ocrstudio.enablePaddleOcr=true
# LiteRT-LM's exact Maven coordinates/API surface are not guaranteed stable; the corrector
# is source-complete (see :engine:correction src/liteRtEnabled) but off by default so the
# guaranteed rule-based correction path always builds. Flip to true once verified in your
# Android Studio environment.
ocrstudio.enableLiteRtLm=false
