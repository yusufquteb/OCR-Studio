name: Android CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew test --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Send debug APK to Telegram
        # Optional convenience step, not part of the app's correctness -- a failure here
        # (missing/invalid secrets, Telegram API hiccup) must never fail the build itself.
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID repo secrets are not set -- skipping."
            exit 0
          fi
          APK_PATH=$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No debug APK found -- skipping."
            exit 0
          fi
          curl -sS --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"${APK_PATH}" \
            -F caption="OCR Studio debug APK — ${GITHUB_REF_NAME} @ ${GITHUB_SHA:0:7}"
